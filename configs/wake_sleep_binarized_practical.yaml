project_root: .
data_dir: data
results_dir: results
device: auto
force: false

data:
  dataset: mnist
  binarization: static_bernoulli
  binarization_seed: 2026
  num_workers: 2

model:
  hidden_dim: 500
  init_std: 0.01

training:
  optimizer: adagrad
  lr:
  lr_candidates: [0.01, 0.02, 0.1]
  batch_size: 100
  epochs: 300
  eval_every: 5
  checkpoint_every: 50
  eval_samples: 1
  map_l2_scale: 1_over_n
  resume: true

experiment:
  z_dims: [3, 5, 10, 20, 200]
  seeds: [0]
